name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint
        name: Lint

      - run: npm run typecheck
        name: TypeCheck

      - run: npm test
        name: Unit Tests

      - run: npm run build
        name: Build
